<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频演示</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .container {
            width: 90%;
            max-width: 1200px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.8);
        }
        video {
            width: 100%;
            display: block;
        }
        .info {
            color: #ccc;
            text-align: center;
            padding: 15px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- controls 显示播放控件，autoplay 自动播放（需 muted 才能自动播），loop 循环，poster 封面图可选 -->
        <video controls autoplay muted loop poster="">
            <source src="shipin.mp4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放，请升级浏览器。
        </video>
        <div class="info">
            🎬 金庸群侠传online怀旧版 · 视频演示
        </div>
    </div>
</body>
</html>
